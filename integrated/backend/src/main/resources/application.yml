server:
  port: 8880

spring:
  application:
    name: integrated-platform
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
  datasource:
    url: jdbc:mysql://localhost:3306/integrated_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3030,http://localhost:5173,https://dev.divinlove.com,https://divinlove.com}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# 首次部署且 admin_users 表为空时，通过环境变量创建初始管理员（代码中不写死账号密码）
# ADMIN_INITIAL_USERNAME=your_name ADMIN_INITIAL_PASSWORD=your_password
admin:
  init:
    username: ${ADMIN_INITIAL_USERNAME:}
    password: ${ADMIN_INITIAL_PASSWORD:}

# 问答平台支付完成后跳转本地生成器
partner:
  mode: local
  generator-path: /generator
  standard-amount-cents: 2990

# 人生蓝图生成器支付配置
payment:
  mode: paypal
  order-amount: 2990
  product-title: 人生蓝图·完整行动版
  frontend-url: ${PAYMENT_FRONTEND_URL:http://localhost:3030}
  base-url: ${PAYMENT_BASE_URL:http://localhost:8880}

meta:
  pixel-id: ${META_PIXEL_ID:1523243282664759}
  capi-access-token: ${META_CAPI_ACCESS_TOKEN:}
  test-event-code: ${META_TEST_EVENT_CODE:TEST9890}
  product-name: ${META_PRODUCT_NAME:Full Life Blueprint Report}
  currency: ${META_CURRENCY:USD}

pay:
  alipay:
    appId: ${ALIPAY_APP_ID:}
    merchantPrivateKey: ${ALIPAY_PRIVATE_KEY:}
    alipayPublicKey: ${ALIPAY_PUBLIC_KEY:}
    notifyUrl: ${ALIPAY_NOTIFY_URL:http://localhost:8880/api/alipay/notify}
    returnUrl: ${ALIPAY_RETURN_URL:}
    signType: RSA2
    charset: utf-8
    timeout: 30m
    gatewayUrl: ${ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  wechat:
    appId: ${WECHAT_APP_ID:}
    mchId: ${WECHAT_MCH_ID:}
    apiV3Key: ${WECHAT_API_V3_KEY:}
    merchantSerialNumber: ${WECHAT_MERCHANT_SERIAL:}
    privateKeyPath: ${WECHAT_PRIVATE_KEY_PATH:}
    merchantPrivateKey: ${WECHAT_PRIVATE_KEY:}
    notifyUrl: ${WECHAT_NOTIFY_URL:http://localhost:8880/api/wechat/notify}
  paypal:
    mode: ${PAYPAL_MODE:sandbox}
    client-id: ${PAYPAL_CLIENT_ID}
    secret: ${PAYPAL_SECRET}
    sandbox-base-url: ${PAYPAL_SANDBOX_BASE_URL:https://api-m.sandbox.paypal.com}
    live-base-url: ${PAYPAL_LIVE_BASE_URL:https://api-m.paypal.com}
    return-url: ${PAYPAL_RETURN_URL:}
    webhook-id-dev: ${PAYPAL_WEBHOOK_ID_DEV:5SL79502L5179051J}
    webhook-id-prod: ${PAYPAL_WEBHOOK_ID_PROD:3A432358DX639405T}

proxy:
  api-key: ${PROXY_API_KEY:sk-fd7052e9abda4e5e9e21cd50bf9be400}
  base-url: ${PROXY_BASE_URL:https://api.deepseek.com}

logging:
  level:
    com.qacollector: INFO
    com.lifeblueprint: INFO
