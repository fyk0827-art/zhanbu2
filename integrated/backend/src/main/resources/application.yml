server:
  port: 8880

spring:
  application:
    name: integrated-platform
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
  datasource:
    url: jdbc:mysql://localhost:3306/integrated_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

cors:
  allowed-origins: "*"

jwt:
  secret: integrated-platform-jwt-secret-key-2024
  expiration: 86400000

# 首次部署且 admin_users 表为空时，通过环境变量创建初始管理员（代码中不写死账号密码）
# ADMIN_INITIAL_USERNAME=your_name ADMIN_INITIAL_PASSWORD=your_password
admin:
  init:
    username: ${ADMIN_INITIAL_USERNAME:}
    password: ${ADMIN_INITIAL_PASSWORD:}

# 问答平台支付完成后跳转本地生成器
partner:
  mode: local
  generator-path: /generator
  standard-amount-cents: 2990

# 人生蓝图生成器支付配置
payment:
  mode: paypal
  order-amount: 2990
  product-title: 人生蓝图·完整行动版
  frontend-url: ${PAYMENT_FRONTEND_URL:http://localhost:3030}
  base-url: ${PAYMENT_BASE_URL:http://localhost:8880}

pay:
  alipay:
    appId: ${ALIPAY_APP_ID:}
    merchantPrivateKey: ${ALIPAY_PRIVATE_KEY:}
    alipayPublicKey: ${ALIPAY_PUBLIC_KEY:}
    notifyUrl: ${ALIPAY_NOTIFY_URL:http://localhost:8880/api/alipay/notify}
    returnUrl: ${ALIPAY_RETURN_URL:}
    signType: RSA2
    charset: utf-8
    timeout: 30m
    gatewayUrl: ${ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  wechat:
    appId: ${WECHAT_APP_ID:}
    mchId: ${WECHAT_MCH_ID:}
    apiV3Key: ${WECHAT_API_V3_KEY:}
    merchantSerialNumber: ${WECHAT_MERCHANT_SERIAL:}
    privateKeyPath: ${WECHAT_PRIVATE_KEY_PATH:}
    merchantPrivateKey: ${WECHAT_PRIVATE_KEY:}
    notifyUrl: ${WECHAT_NOTIFY_URL:http://localhost:8880/api/wechat/notify}
  paypal:
    client-id: ${PAYPAL_CLIENT_ID:AfXm2ti4T23Ys-DglNzOIIjEPFV9FUM6IjwOyBXyasNK6p2jyn8b7qyyrthuefIzub3Z4AQ5aEuqcWWK}
    secret: ${PAYPAL_SECRET:EERPl40QbcPqhwgt4YsqKPO6qdlHyP_jOeXY2ev0IRqO7LQxgbdxWiKPktRboI_A5R4Jl-zF0dldJUTW}
    sandbox-base-url: https://api-m.sandbox.paypal.com
    return-url: ${PAYPAL_RETURN_URL:}

logging:
  level:
    com.qacollector: INFO
    com.lifeblueprint: INFO
